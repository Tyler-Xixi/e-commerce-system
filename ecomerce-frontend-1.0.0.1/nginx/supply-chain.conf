server {
    listen 80;
    server_name supply-chain.local;

    root /usr/share/nginx/html/supply-chain;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/public/ {
        proxy_pass http://springboot-backend:8080/public/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        proxy_pass http://springboot-backend:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass http://springboot-backend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /oss/ {
        proxy_pass https://example-bucket.oss-cn-hangzhou.aliyuncs.com/;
        proxy_set_header Host example-bucket.oss-cn-hangzhou.aliyuncs.com;
    }
}
